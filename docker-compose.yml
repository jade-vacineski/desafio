services:
  mysql:
    image: mysql:8
    container_name: desafio-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: desafio_itau
      MYSQL_USER: app
      MYSQL_PASSWORD: App@123456
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
